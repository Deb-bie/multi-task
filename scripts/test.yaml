apiVersion: batch/v1
kind: Job

metadata:
  name: test-hn
  labels:
    app: mt-cyclegan-test
    anatomy: head-neck

spec:
  backoffLimit: 0
  completions: 1
  parallelism: 1
  ttlSecondsAfterFinished: 172800

  template:
    metadata:
      labels:
        app: mt-cyclegan-test
        anatomy: head-neck

    spec:
      restartPolicy: Never

      containers:
        - name: test
          image: nvcr.io/nvidia/pytorch:23.10-py3
          imagePullPolicy: IfNotPresent

          env:
            - name: ANATOMY
              value: "head_neck"

            - name: DATA_ROOT
              value: "/data/Task1/Task1"

            - name: DATA_DIR
              value: "/data/Task1/Task1/HN"

            - name: SPLIT_DIR
              value: "/data/splits"

            - name: CKPT_ROOT
              value: "/data/ablation_outputs/checkpoints"

            - name: FULL_MODEL_CKPT
              value: "/data/results/checkpoints/plus_anatomy_consistency/head_neck/best_model.pth"

            - name: OUTPUT_DIR
              value: "/data/ablation_outputs"

            - name: PYTHONUNBUFFERED
              value: "1"

          command:
            - bash
            - -c
            - |
              set -euo pipefail

              log() {
                echo "[$(date '+%Y-%m-%d %H:%M:%S')] $*"
              }

              log "=== MT-CycleGAN Test Evaluation ==="
              log "Anatomy   : ${ANATOMY}"
              log "Data root : ${DATA_ROOT}"
              log "Ckpt root : ${CKPT_ROOT}"
              log "Output dir: ${OUTPUT_DIR}"

              nvidia-smi --query-gpu=name,memory.total --format=csv,noheader || true

              # ── Clone / update repo ─────────────────────────────────────
              mkdir -p /opt/repo
              cd /opt/repo

              if [ -d "multi-task/.git" ]; then
                log "Repo exists — pulling latest"
                cd multi-task
                git pull origin main
              else
                log "Cloning repo..."

                git clone --single-branch -b main \
                  https://github.com/Deb-bie/multi-task.git \
                  multi-task

                cd multi-task
              fi

              log "Repo HEAD: $(git rev-parse --short HEAD)"

              # ── Install dependencies ────────────────────────────────────
              log "Installing dependencies..."
              pip install -q -r requirements.txt

              # ── Verify GPU ──────────────────────────────────────────────
              python3 -c "
              import torch
              assert torch.cuda.is_available(), 'No CUDA GPU visible'
              print(f'GPU: {torch.cuda.get_device_name(0)}')
              "

              # ── Create config builder script ────────────────────────────
              cat > /tmp/make_config.py <<'PYEOF'
              import json
              import pathlib
              import sys

              name = sys.argv[1]
              anatomy = sys.argv[2]
              out_path = sys.argv[3]

              base = json.load(open("configs/base_config.json"))

              anat_path = pathlib.Path(
                  f"configs/anatomy/{anatomy}.json"
              )

              anat = {}

              if anat_path.exists():
                  raw = json.load(open(anat_path))

                  anat = {
                      k: v
                      for k, v in raw.items()
                      if not k.startswith("_")
                  }

              overrides = {
                  "g0_baseline_cyclegan": {
                      "LAMBDA_SEG": 0,
                      "LAMBDA_ANATOMY": 0,
                      "LAMBDA_ANATOMY_CT2MR": 0,
                      "LAMBDA_PAIRED_MR2CT": 0,
                      "LAMBDA_PAIRED_CT2MR": 0,
                      "LAMBDA_PERCEPTUAL": 0,
                      "LAMBDA_IDENTITY": 0,
                  },

                  "g0_plus_seg": {
                      "LAMBDA_ANATOMY": 0,
                      "LAMBDA_ANATOMY_CT2MR": 0,
                  },

                  "g1_separate_encoders": {
                      "SHARED_ENCODER": False,
                  },

                  "full_model": {},
              }.get(name, {})

              merged = {
                  **base,
                  **anat,
                  **overrides,
              }

              merged = {
                  k: v
                  for k, v in merged.items()
                  if not k.startswith("_")
              }

              json.dump(
                  merged,
                  open(out_path, "w"),
                  indent=2
              )

              print(f"Config written: {out_path}")
              PYEOF

              # ── Generic ablation runner ────────────────────────────────
              run_test() {
                local NAME=$1
                local CKPT_DIR="${CKPT_ROOT}/${NAME}/${ANATOMY}"
                local CKPT="${CKPT_DIR}/best_model.pth"
                local CFG="/tmp/test_cfg_${NAME}.json"

                log "--- Testing: ${NAME} ---"

                if [ ! -f "${CKPT}" ]; then
                  log "[SKIP] Checkpoint not found: ${CKPT}"
                  return
                fi

                python3 /tmp/make_config.py \
                  "${NAME}" \
                  "${ANATOMY}" \
                  "${CFG}"

                log "Checkpoint : ${CKPT}"
                log "Config      : ${CFG}"

                python3 evaluate/test_multitask.py \
                  --anatomy "${ANATOMY}" \
                  --ablation_name "${NAME}" \
                  --data_root "${DATA_ROOT}" \
                  --split_dir "${SPLIT_DIR}" \
                  --checkpoint "${CKPT}" \
                  --checkpoint_type best_model \
                  --config "${CFG}" \
                  --output_dir "${OUTPUT_DIR}" \
                  --batch_size 8

                log "Done: ${NAME}"
              }

              # ── Full model evaluation ──────────────────────────────────
              log "=== [1/4] Full model ==="

              if [ ! -f "${FULL_MODEL_CKPT}" ]; then
                log "[SKIP] Full model checkpoint not found:"
                log "       ${FULL_MODEL_CKPT}"
              else
                CFG_FULL="/tmp/test_cfg_full_model.json"

                python3 /tmp/make_config.py \
                  "full_model" \
                  "${ANATOMY}" \
                  "${CFG_FULL}"

                log "Checkpoint : ${FULL_MODEL_CKPT}"
                log "Config      : ${CFG_FULL}"

                python3 evaluate/test_multitask.py \
                  --anatomy "${ANATOMY}" \
                  --ablation_name "full_model" \
                  --data_root "${DATA_ROOT}" \
                  --split_dir "${SPLIT_DIR}" \
                  --checkpoint "${FULL_MODEL_CKPT}" \
                  --checkpoint_type best_model \
                  --config "${CFG_FULL}" \
                  --output_dir "${OUTPUT_DIR}" \
                  --batch_size 8

                log "Done: full_model"
              fi

              # ── Ablation evaluations ───────────────────────────────────
              log "=== [2/4] g0_baseline_cyclegan ==="
              run_test "g0_baseline_cyclegan"

              log "=== [3/4] g0_plus_seg ==="
              run_test "g0_plus_seg"

              log "=== [4/4] g1_separate_encoders ==="
              run_test "g1_separate_encoders"

              log "=== All test evaluations complete ==="

              log "Results written to: ${OUTPUT_DIR}/results/"
              log "NIfTIs written to : ${OUTPUT_DIR}/niftis/"

              ls -lh "${OUTPUT_DIR}/results/" || true

          volumeMounts:
            - name: git-volume
              mountPath: /opt/repo

            - name: synthrad-data-volume
              mountPath: /data

          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: 24Gi
              cpu: "4"

            requests:
              nvidia.com/gpu: "1"
              memory: 16Gi
              cpu: "2"

      volumes:
        - name: git-volume
          emptyDir: {}

        - name: synthrad-data-volume
          persistentVolumeClaim:
            claimName: synthrad-multitask-train-data