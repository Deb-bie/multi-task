apiVersion: batch/v1
kind: Job
metadata:
  name: synthrad-multitask-train-job
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A100-SXM4-80GB
                - NVIDIA-A100-SXM4-40GB
                - NVIDIA-A6000
                - NVIDIA-RTX-A6000
                - NVIDIA-GeForce-RTX-3090
                - NVIDIA-GeForce-RTX-2080-Ti
      containers:
      - name: synthrad-multitask-training
        image: nvcr.io/nvidia/pytorch:23.10-py3
        imagePullPolicy: IfNotPresent

        env:
        - name: REPO_PATH
          value: /opt/repo/multi-task
        - name: ABLATION_NAME
          value: plus_anatomy_consistency

        command:
        - "bash"
        - "-c"
        - |
          # ── Fail immediately on any error, treat unset vars as errors ──────
          set -euo pipefail

          # ── Helper: log to both master log and kubectl logs (stdout) ────────
          LOG_DIR=/data/results/logs/${ABLATION_NAME}
          MASTER_LOG=${LOG_DIR}/training_all.log

          log() {
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] $*" | tee -a "${MASTER_LOG}"
          }

          echo "Checking GPU..."
          nvidia-smi

          # ── Clone / update repo ─────────────────────────────────────────────
          mkdir -p /opt/repo && cd /opt/repo

          if [ -d "multi-task/.git" ]; then
            log "Repo exists — pulling latest"
            cd multi-task && git pull origin main
          else
            log "Cloning repo..."
            git clone --single-branch -b main \
              https://github.com/Deb-bie/multi-task.git \
              multi-task
            cd multi-task
          fi

          log "Repo HEAD: $(git rev-parse --short HEAD)"

          # ── Install dependencies ────────────────────────────────────────────
          log "Installing Python dependencies..."
          pip install -q \
            numpy==1.24.3 \
            pandas==2.0.3 \
            SimpleITK==2.3.1 \
            opencv-python-headless \
            torchmetrics \
            tqdm \
            matplotlib \
            scipy \
            psutil \
            scikit-image \
            torchvision

          export PYTHONPATH=/opt/repo/multi-task

          # ── Pre-flight checks ───────────────────────────────────────────────
          log "Running pre-flight checks..."

          # Verify data root exists and has the expected anatomy directories
          DATA_ROOT=/data/Task1
          for ANATOMY in head_neck thorax abdomen; do
            if [ ! -d "${DATA_ROOT}/${ANATOMY}" ]; then
              log "ERROR: Data directory missing: ${DATA_ROOT}/${ANATOMY}"
              exit 1
            fi
            log "  Found: ${DATA_ROOT}/${ANATOMY}"
          done

          # Verify Python can import the project
          python -c "from src.models import MultitaskCycleGAN; from src.dataset import make_dataloader, load_split; print('imports OK')"

          # ── Create output directories ───────────────────────────────────────
          SPLIT_DIR=/data/splits
          mkdir -p /data/results/checkpoints/${ABLATION_NAME}/head_neck
          mkdir -p /data/results/checkpoints/${ABLATION_NAME}/thorax
          mkdir -p /data/results/checkpoints/${ABLATION_NAME}/abdomen
          mkdir -p "${LOG_DIR}"
          mkdir -p "${SPLIT_DIR}"

          log "========================================"
          log "Job started"
          log "Ablation: ${ABLATION_NAME}"
          nvidia-smi | tee -a "${MASTER_LOG}"

          # ── Generate train/val/test splits (idempotent — skips if exists) ───
          for ANATOMY in head_neck thorax abdomen; do
            SPLIT_FILE="${SPLIT_DIR}/${ANATOMY}_split.json"
            if [ -f "${SPLIT_FILE}" ]; then
              log "Split already exists for ${ANATOMY}: ${SPLIT_FILE}"
            else
              log "Generating split for ${ANATOMY}..."
              python scripts/prepare_splits.py \
                --data_root "${DATA_ROOT}" \
                --anatomy   "${ANATOMY}" \
                --split_dir "${SPLIT_DIR}" \
                --seed      42 \
                2>&1 | tee -a "${MASTER_LOG}"
            fi
          done

          # ── Train each anatomy — tee output to both file and kubectl logs ───
          # tee sends to file; the parent process's stdout goes to kubectl logs.
          # The `|| { ...; exit 1; }` block catches failures and prints which
          # anatomy failed so the Job is marked Failed, not Completed.

          for ANATOMY in head_neck thorax abdomen; do
            log "========================================"
            log "Starting training: ${ANATOMY}"

            python train/train_multitask.py \
              --anatomy       "${ANATOMY}" \
              --data_root     "${DATA_ROOT}" \
              --split_dir     "${SPLIT_DIR}" \
              --config        configs/base_config.json \
              --output_dir    /data/results \
              --ablation_name "${ABLATION_NAME}" \
              2>&1 | tee -a "${LOG_DIR}/multitask_${ANATOMY}.log" \
              || {
                log "ERROR: training failed for ${ANATOMY} (exit code $?)"
                exit 1
              }

            log "Finished training: ${ANATOMY}"
          done

          log "========================================"
          log "All three anatomies complete. Job done."

          
        volumeMounts:
        - name: git-volume
          mountPath: /opt/repo
        - name: synthrad-data-volume
          mountPath: /data

        resources:
          limits:
            memory: 128Gi
            cpu: "16"
            nvidia.com/gpu: "1"
            ephemeral-storage: 50Gi
          requests:
            memory: 64Gi
            cpu: "12"
            nvidia.com/gpu: "1"
            ephemeral-storage: 20Gi

      volumes:
      - name: git-volume
        emptyDir: {}
      - name: synthrad-data-volume
        persistentVolumeClaim:
          claimName: synthrad-multitask-train-data
