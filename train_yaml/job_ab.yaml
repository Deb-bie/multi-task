apiVersion: batch/v1
kind: Job
metadata:
  name: synthrad-train-ab
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A100-SXM4-80GB
                - NVIDIA-A100-SXM4-40GB
                - NVIDIA-A6000
                - NVIDIA-RTX-A6000
                - NVIDIA-GeForce-RTX-3090
                - NVIDIA-GeForce-RTX-2080-Ti
      containers:
      - name: train-abdomen
        image: nvcr.io/nvidia/pytorch:23.10-py3
        imagePullPolicy: IfNotPresent
        env:
        - name: ANATOMY
          value: abdomen
        - name: DIR_NAME
          value: AB
        - name: ABLATION_NAME
          value: plus_anatomy_consistency
        - name: PYTHONUNBUFFERED
          value: "1"
        command: ["bash", "-c"]
        args:
        - |
          set -euo pipefail
          ANATOMY="${ANATOMY}"
          DIR_NAME="${DIR_NAME}"
          ABLATION_NAME="${ABLATION_NAME}"
          DATA_ROOT=/data/Task1/Task1
          SPLIT_DIR=/data/splits
          LOG_DIR=/data/results/logs/${ABLATION_NAME}/${ANATOMY}
          MASTER_LOG=${LOG_DIR}/training_all.log

          log() { echo "[$(date '+%Y-%m-%d %H:%M:%S')] $*" | tee -a "${MASTER_LOG}"; }

          mkdir -p "${LOG_DIR}" "${SPLIT_DIR}"
          mkdir -p /data/results/checkpoints/${ABLATION_NAME}/${ANATOMY}

          echo "Checking GPU..."
          nvidia-smi

          mkdir -p /opt/repo && cd /opt/repo
          if [ -d "multi-task/.git" ]; then
            log "Repo exists — pulling latest"
            cd multi-task && git pull origin main
          else
            log "Cloning repo..."
            git clone --single-branch -b main \
              https://github.com/Deb-bie/multi-task.git multi-task
            cd multi-task
          fi
          log "Repo HEAD: $(git rev-parse --short HEAD)"

          log "Installing Python dependencies..."
          pip install -q \
            numpy==1.24.3 pandas==2.0.3 SimpleITK==2.3.1 \
            opencv-python-headless torchmetrics tqdm \
            matplotlib scipy psutil scikit-image torchvision

          export PYTHONPATH=/opt/repo/multi-task

          log "Running pre-flight checks..."
          if [ ! -d "${DATA_ROOT}/${DIR_NAME}" ]; then
            log "ERROR: Data directory missing: ${DATA_ROOT}/${DIR_NAME}"
            exit 1
          fi
          log "  Found: ${DATA_ROOT}/${DIR_NAME}"
          python -c "from src.models import MultitaskCycleGAN; from src.dataset import make_dataloader, load_split; print('imports OK')"

          SPLIT_FILE="${SPLIT_DIR}/${ANATOMY}_split.json"
          if [ -f "${SPLIT_FILE}" ]; then
            log "Split already exists: ${SPLIT_FILE}"
          else
            log "Generating split for ${ANATOMY}..."
            python scripts/prepare_splits.py \
              --data_dir  "${DATA_ROOT}/${DIR_NAME}" \
              --anatomy   "${ANATOMY}" \
              --split_dir "${SPLIT_DIR}" \
              --seed      42 \
              2>&1 | tee -a "${MASTER_LOG}"
          fi

          log "========================================"
          log "Starting training: ${ANATOMY}  ablation=${ABLATION_NAME}"
          nvidia-smi | tee -a "${MASTER_LOG}"

          python train/train_multitask.py \
            --anatomy       "${ANATOMY}" \
            --data_root     "${DATA_ROOT}" \
            --split_dir     "${SPLIT_DIR}" \
            --config        configs/base_config.json \
            --output_dir    /data/results \
            --ablation_name "${ABLATION_NAME}" \
            2>&1 | tee -a "${LOG_DIR}/train.log" \
            || { log "ERROR: training failed (exit $?)"; exit 1; }

          log "========================================"
          log "Done: ${ANATOMY}"

        volumeMounts:
        - name: git-volume
          mountPath: /opt/repo
        - name: synthrad-data-volume
          mountPath: /data
        resources:
          limits:
            memory: 128Gi
            cpu: "16"
            nvidia.com/gpu: "1"
            ephemeral-storage: 50Gi
          requests:
            memory: 64Gi
            cpu: "12"
            nvidia.com/gpu: "1"
            ephemeral-storage: 20Gi
      volumes:
      - name: git-volume
        emptyDir: {}
      - name: synthrad-data-volume
        persistentVolumeClaim:
          claimName: synthrad-multitask-train-data
