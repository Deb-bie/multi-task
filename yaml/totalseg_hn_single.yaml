apiVersion: v1
kind: Pod
metadata:
  name: totalseg-hn-single
spec:
  restartPolicy: Never
  containers:
  - name: totalseg
    image: nvcr.io/nvidia/pytorch:23.10-py3
    imagePullPolicy: IfNotPresent

    env:
    - name: PATIENT_ID
      value: "1HNA001"               # Replace with a patient ID from your HN set
    - name: ANATOMY
      value: head_neck
    - name: DATA_DIR
      value: /data/Task1/Task1/HN
    - name: OUTPUT_DIR
      value: /data/seg_outputs
    - name: PYTHONUNBUFFERED
      value: "1"

    command: ["bash", "-c"]
    args:
    - |
      set -euo pipefail

      echo "[$(date)] Testing TotalSegmentator on single H&N patient: ${PATIENT_ID} (no --fast)"

      pip install -q SimpleITK==2.3.1 TotalSegmentator

      CT_MHA="${DATA_DIR}/${PATIENT_ID}/ct.mha"
      TMP_CT="/tmp/${PATIENT_ID}_ct.nii.gz"
      SEG_OUT_DIR="${OUTPUT_DIR}/${ANATOMY}/${PATIENT_ID}/seg_raw"
      FINAL_SEG_DIR="${OUTPUT_DIR}/${ANATOMY}/${PATIENT_ID}/seg"

      mkdir -p "${SEG_OUT_DIR}" "${FINAL_SEG_DIR}"

      python3 <<EOF
      import SimpleITK as sitk
      img = sitk.ReadImage('${CT_MHA}')
      sitk.WriteImage(img, '${TMP_CT}')
      EOF

      # TotalSegmentator -i "${TMP_CT}" -o "${SEG_OUT_DIR}" \
      #     --task total \
      #     --roi_subset brainstem parotid_gland_left parotid_gland_right mandible spinal_cord

      TotalSegmentator -i "${TMP_CT}" -o "${SEG_OUT_DIR}" \
          --task total \
          --fast

      # List all produced segmentations for debugging
      echo "Available segmentations:"
      ls -la "${SEG_OUT_DIR}"/*.nii.gz 2>/dev/null || echo "None found"

      

      # For head_neck task, the output filenames match the organ names directly:
      # brainstem.nii.gz, parotid_gland_left.nii.gz, parotid_gland_right.nii.gz,
      # mandible.nii.gz, spinal_cord.nii.gz
      declare -A MAP=(
          [brainstem]=brainstem
          [parotid_gland_left]=parotid_L
          [parotid_gland_right]=parotid_R
          [mandible]=mandible
          [spinal_cord]=spinal_cord
      )
      for src in "${!MAP[@]}"; do
          src_file="${SEG_OUT_DIR}/${src}.nii.gz"
          dst_file="${FINAL_SEG_DIR}/${MAP[$src]}.nii.gz"
          if [[ -f "$src_file" ]]; then
              cp "$src_file" "$dst_file"
              echo "Copied: $src → ${MAP[$src]}"
          else
              echo "WARNING: Missing $src_file"
          fi
      done




      # declare -A MAP=(
      #     [brainstem]=brainstem
      #     [parotid_gland_left]=parotid_L
      #     [parotid_gland_right]=parotid_R
      #     [mandible]=mandible
      #     [spinal_cord]=spinal_cord
      # )
      # for src in "${!MAP[@]}"; do
      #     src_file="${SEG_OUT_DIR}/${src}.nii.gz"
      #     dst_file="${FINAL_SEG_DIR}/${MAP[$src]}.nii.gz"
      #     if [[ -f "$src_file" ]]; then
      #         cp "$src_file" "$dst_file"
      #         echo "Copied: $src → ${MAP[$src]}"
      #     else
      #         echo "WARNING: Missing $src_file"
      #     fi
      # done

      rm -f "${TMP_CT}"
      echo "[$(date)] Done. Outputs in ${FINAL_SEG_DIR}"

    volumeMounts:
    - name: synthrad-data-volume
      mountPath: /data

    resources:
      limits:
        nvidia.com/gpu: 1
        memory: 32Gi
        cpu: "8"
        ephemeral-storage: 40Gi
      requests:
        nvidia.com/gpu: 1
        memory: 24Gi
        cpu: "4"
        ephemeral-storage: 20Gi

  volumes:
  - name: synthrad-data-volume
    persistentVolumeClaim:
      claimName: synthrad-multitask-train-data