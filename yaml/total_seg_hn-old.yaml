apiVersion: v1
kind: Pod
metadata:
  name: totalseg-hn
spec:
  restartPolicy: Never
  containers:
  - name: totalseg
    image: nvcr.io/nvidia/pytorch:23.10-py3
    imagePullPolicy: IfNotPresent

    env:
    - name: ANATOMY
      value: head_neck
    - name: DATA_DIR
      value: /data/Task1/Task1/HN
    - name: OUTPUT_DIR
      value: /data/seg_outputs
    - name: PYTHONUNBUFFERED
      value: "1"
    command: ["bash", "-c"]
    args:
    - |
      set -euo pipefail

      echo "[$(date)] Starting TotalSegmentator for ${ANATOMY}..."

      # ── Clone / update repo ──────────────────────────────────────────────
      mkdir -p /opt/repo && cd /opt/repo
      if [ -d "multi-task/.git" ]; then
        echo "Repo exists — pulling latest"
        cd multi-task && git pull origin main
      else
        git clone --single-branch -b main \
          https://github.com/Deb-bie/multi-task.git \
          multi-task
        cd multi-task
      fi
      echo "Repo HEAD: $(git rev-parse --short HEAD)"


      # ── Install dependencies ─────────────────────────────────────────────
      echo "[$(date)] Installing dependencies..."
      pip install -q \
        SimpleITK==2.3.1 \
        TotalSegmentator


      # ── Run batch segmentation ───────────────────────────────────────────
      echo "[$(date)] Running run_totalsegmentator.sh..."
      bash scripts/run_totalsegmentator.sh


      # ── Merge per-organ NIfTI labels → single seg.mha per patient ────────
      echo "[$(date)] Merging seg labels..."
      python scripts/merge_seg_labels.py \
        --anatomy   "${ANATOMY}" \
        --data_dir  "${DATA_DIR}" \
        --seg_dir   "${OUTPUT_DIR}" \
        --overwrite

      echo "[$(date)] Done. Verifying output..."
      find "${DATA_DIR}" -name "seg.nii.gz" | wc -l

      echo "[$(date)] TotalSegmentator + merge complete for ${ANATOMY}."


    volumeMounts:
    - name: git-volume
      mountPath: /opt/repo
    - name: synthrad-data-volume
      mountPath: /data

    resources:
      limits:
        memory: 24Gi        # Task 297 model + CT volume + resampling workspace
        cpu: "8"
        ephemeral-storage: 30Gi   # model weights cached to /root/.totalseg
      requests:
        memory: 16Gi
        cpu: "4"
        ephemeral-storage: 20Gi

  volumes:
  - name: git-volume
    emptyDir: {}
  - name: synthrad-data-volume
    persistentVolumeClaim:
      claimName: synthrad-multitask-train-data
