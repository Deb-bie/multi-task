apiVersion: v1
kind: Pod
metadata:
  name: totalseg-ab-single
spec:
  restartPolicy: Never
  containers:
  - name: totalseg
    image: nvcr.io/nvidia/pytorch:23.10-py3
    imagePullPolicy: IfNotPresent

    env:
    - name: PATIENT_ID
      value: "1ABC129" 
    - name: ANATOMY
      value: abdomen
    - name: DATA_DIR
      value: /data/Task1/Task1/AB
    - name: OUTPUT_DIR
      value: /data/seg_outputs
    - name: PYTHONUNBUFFERED
      value: "1"

    command: ["bash", "-c"]
    args:
    - |
      set -euo pipefail

      echo "[$(date)] Testing TotalSegmentator on single patient: ${PATIENT_ID} (no --fast)"

      # Install dependencies
      pip install -q SimpleITK==2.3.1 TotalSegmentator

      # Paths
      CT_MHA="${DATA_DIR}/${PATIENT_ID}/ct.mha"
      TMP_CT="/tmp/${PATIENT_ID}_ct.nii.gz"
      SEG_OUT_DIR="${OUTPUT_DIR}/${ANATOMY}/${PATIENT_ID}/seg_raw"
      FINAL_SEG_DIR="${OUTPUT_DIR}/${ANATOMY}/${PATIENT_ID}/seg"

      mkdir -p "${SEG_OUT_DIR}" "${FINAL_SEG_DIR}"

      # Convert .mha → NIfTI
      python3 <<EOF
      import SimpleITK as sitk
      img = sitk.ReadImage('${CT_MHA}')
      sitk.WriteImage(img, '${TMP_CT}')
      EOF

      # Run TotalSegmentator WITHOUT --fast (full resolution)
      TotalSegmentator -i "${TMP_CT}" -o "${SEG_OUT_DIR}" \
          --task total \
          --roi_subset liver kidney_left kidney_right spleen pancreas

      # Copy outputs (rename to project names)
      declare -A MAP=(
          [liver]=liver
          [kidney_left]=kidney_L
          [kidney_right]=kidney_R
          [spleen]=spleen
          [pancreas]=pancreas
      )
      for src in "${!MAP[@]}"; do
          src_file="${SEG_OUT_DIR}/${src}.nii.gz"
          dst_file="${FINAL_SEG_DIR}/${MAP[$src]}.nii.gz"
          if [[ -f "$src_file" ]]; then
              cp "$src_file" "$dst_file"
              echo "Copied: $src → ${MAP[$src]}"
          else
              echo "WARNING: Missing $src_file"
          fi
      done

      # Cleanup
      rm -f "${TMP_CT}"
      echo "[$(date)] Done. Outputs in ${FINAL_SEG_DIR}"

    volumeMounts:
    - name: synthrad-data-volume
      mountPath: /data

    resources:
      limits:
        memory: 32Gi              # increase for full‑res segmentation
        cpu: "8"
        ephemeral-storage: 40Gi
      requests:
        memory: 24Gi
        cpu: "4"
        ephemeral-storage: 20Gi

  volumes:
  - name: synthrad-data-volume
    persistentVolumeClaim:
      claimName: synthrad-multitask-train-data